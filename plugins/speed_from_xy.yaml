# Computes the same kind of 2-second smoothed speed as the built-in speed value,
# but derives it from explicit x/y displacement bindings.
version: 1
name: Speed from XY (Box)
description: Mean smoothed centroid speed per worm, shown as box-and-whisker per group. This computes speed directly from x/y displacement and elapsed time, then smooths over a 2-second window instead of using the plugin engine's built-in speed variable.
aggregate: per_worm
bindings:
  q: quality
  dx: diff(x)
  dy: diff(y)
  dt: diff(t)
  raw_xy_speed: sqrt(dx*dx + dy*dy) / dt
  # smooths speed over a 2 second sliding window, filters by quality lost. 
  xy_speed: smooth(raw_xy_speed, 2, q != Lost && prev_q != Lost && dt > 0 && raw_xy_speed > 0) 
formula: xy_speed
filter: xy_speed > 0
reduce: mean
plot:
  type: box
  y_label: Mean XY Speed (px/s)
