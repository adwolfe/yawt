version: 1
name: Speed (Timeline)
description: Smoothed speed at each frame, plotted as a time series line per worm. Mirrors the built-in Speed Timeline plot.
aggregate: per_frame
formula: speed
filter: quality != Lost
plot:
  type: line
  y_label: Speed (px/s)
  y_label_um: Speed (µm/s)
  x_label: Time (s)
